        const dimensionNames = {
            Z1: "自我锚定度", Z2: "自我和解力", Z3: "自我更新欲",

            R1: "世界灰度感", R2: "视角转换力", R3: "意义建构力",
            X1: "内在驱动力", X2: "决断清晰度", X3: "节奏掌控力",

        let currentQuestion = 0;

        let radarChart = null;

        function startQuiz() {
            document.getElementById("start-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.remove("hidden");
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById("question-count").textContent = `第 ${currentQuestion + 1} / 30 题`;
            document.getElementById("progress-bar").style.width = `${((currentQuestion + 1)/30)*100}%`;
            document.getElementById("question-text").textContent = q.text;
            
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            
            q.options.forEach(option => {
                const btn = document.createElement("button");
                btn.className = "w-full text-left p-4 rounded-lg border border-gray-200 hover:border-orange-300 hover:bg-orange-50 transition-all fade-in";
                btn.textContent = option.text;
                btn.onclick = () => selectOption(option.score, q.dimension);
                optionsContainer.appendChild(btn);
            });

            const card = document.getElementById("question-card");
            card.classList.remove("fade-in");
            void card.offsetWidth;
            card.classList.add("fade-in");
        }

        function selectOption(score, dimension) {
            scores[dimension] += score;
            currentQuestion++;
            currentQuestion >= questions.length ? calculateResult() : loadQuestion();
        }

        function renderRadarChart(scores) {
            const axisScores = [
                scores.Z1 + scores.Z2 + scores.Z3,
                scores.G1 + scores.G2 + scores.G3,
                scores.R1 + scores.R2 + scores.R3,
                scores.X1 + scores.X2 + scores.X3,
                scores.S1 + scores.S2 + scores.S3
            ];
            const ctx = document.getElementById('radar-chart').getContext('2d');
            if (radarChart) radarChart.destroy();
            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['自我', '关系', '认知', '行动', '社交'],
                    datasets: [{
                        label: '你的属性值',
                        data: axisScores,
                        backgroundColor: 'rgba(249, 115, 22, 0.2)',
                        borderColor: 'rgb(249, 115, 22)',
                        pointBackgroundColor: 'rgb(249, 115, 22)',
                        pointBorderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    scales: { r: { min: 6, max: 18, ticks: { display: false }, pointLabels: { font: { size: 12 } } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderDimensions(dimensions, scores) {
            const container = document.getElementById("dimensions-container");
            container.innerHTML = "";
            const groups = [
                { name: "Z轴 · 自我内在", dims: ["Z1", "Z2", "Z3"] },
                { name: "G轴 · 关系互动", dims: ["G1", "G2", "G3"] },
                { name: "R轴 · 认知视角", dims: ["R1", "R2", "R3"] },
                { name: "X轴 · 行动模式", dims: ["X1", "X2", "X3"] },
                { name: "S轴 · 社交存在", dims: ["S1", "S2", "S3"] }
            ];
            groups.forEach(group => {
                const groupTitle = document.createElement("p");
                groupTitle.className = "text-xs font-medium text-gray-400 mb-2";
                groupTitle.textContent = group.name;
                container.appendChild(groupTitle);
                group.dims.forEach(dimKey => {
                    const level = dimensions[dimKey];
                    const score = scores[dimKey];
                    const dimItem = document.createElement("div");
                    dimItem.className = "flex items-center justify-between mb-2";
                    dimItem.innerHTML = `
                        <div class="flex items-center gap-2 w-2/5">
                            <span class="text-sm text-gray-700">${dimensionNames[dimKey]}</span>
                            <span class="text-xs px-1.5 py-0.5 rounded tag-${level}">${level}</span>
                        </div>
                        <div class="w-3/5 bg-gray-200 rounded-full h-2 overflow-hidden">
                            <div class="h-full rounded-full tag-${level}" style="width: ${(score/6)*100}%"></div>
                        </div>
                    `;
                    container.appendChild(dimItem);
                });
            });
        }

        function calculateResult() {
            const dimensions = {};
            for (const key in scores) {
                dimensions[key] = scores[key] >=5 ? "H" : scores[key] >=3 ? "M" : "L";
            }

            // 【关键调整：概率均衡机制】
            // 1. 先按符合率筛选前5名（符合率=符合数量/总核心数）
            const validPersonalities = personalities.filter(p => !p.extraCondition || p.extraCondition(dimensions));
            const candidates = validPersonalities.map(p => {
                let matchCount = 0;
                const totalCore = Object.keys(p.core).length;
                for (const key in p.core) {
                    if (dimensions[key] === p.core[key]) matchCount++;
                }
                const matchRate = matchCount / totalCore;
                return { ...p, matchRate, matchCount };
            }).sort((a, b) => b.matchRate - a.matchRate).slice(0, 5);

            // 2. 在前5名中随机抽取1个，大幅增加冷门人格概率
            const selected = candidates[Math.floor(Math.random() * candidates.length)];

            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");
            document.getElementById("result-avatar").textContent = selected.emoji;
            document.getElementById("result-en-type").textContent = selected.enName;
            document.getElementById("result-cn-type").textContent = selected.cnName;
            document.getElementById("result-match").textContent = `匹配度 ${Math.round(selected.matchRate * 100)}%`;
            document.getElementById("result-remark").textContent = selected.remark;
            document.getElementById("result-desc").textContent = selected.desc;

            renderRadarChart(scores);
            renderDimensions(dimensions, scores);
        }

        function restart() {
            currentQuestion = 0;
            scores = { Z1:0, Z2:0, Z3:0, G1:0, G2:0, G3:0, R1:0, R2:0, R3:0, X1:0, X2:0, X3:0, S1:0, S2:0, S3:0 };
            if (radarChart) radarChart.destroy();
            document.getElementById("result-screen").classList.add("hidden");
            document.getElementById("start-screen").classList.remove("hidden");
        }
